name: Release Skills

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .skill files
        run: |
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              name="${dir%/}"
              echo "Packaging ${name}..."
              zip -r "${name}.skill" "${dir}"
              echo "  → ${name}.skill ($(du -h "${name}.skill" | cut -f1))"
            fi
          done

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for skill in *.skill; do
            echo "Uploading ${skill}..."
            gh release upload "${{ github.event.release.tag_name }}" "${skill}" --clobber
          done
